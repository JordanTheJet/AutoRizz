name = "autorizz-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
ENVIRONMENT = "production"
# JWT_SECRET is set via `wrangler secret put JWT_SECRET`

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "autorizz-db"
database_id = "9a91c192-b21c-4f1d-b59a-1d7c21ebfd07"

[[kv_namespaces]]
binding = "SESSIONS"
id = "530b4c5ca4dc445f8f9a87f7f75429a0"

# Secrets (set via wrangler secret put):
# - JWT_SECRET: signing key for JWTs
# - ANTHROPIC_API_KEY
# - OPENAI_API_KEY
# - GOOGLE_API_KEY
# - OPENROUTER_API_KEY
