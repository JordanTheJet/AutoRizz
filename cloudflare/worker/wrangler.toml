name = "autorizz-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
ENVIRONMENT = "production"
JWT_SECRET = "" # Set via `wrangler secret put JWT_SECRET`

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "autorizz-db"
database_id = "" # Set after `wrangler d1 create autorizz-db`

# KV namespace for session/rate-limit data
[[kv_namespaces]]
binding = "SESSIONS"
id = "" # Set after `wrangler kv:namespace create SESSIONS`

# Secrets (set via wrangler secret put):
# - JWT_SECRET: signing key for JWTs
# - ANTHROPIC_API_KEY
# - OPENAI_API_KEY
# - GOOGLE_API_KEY
# - OPENROUTER_API_KEY
